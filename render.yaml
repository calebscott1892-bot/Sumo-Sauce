previews:
  generation: off

services:
  - type: web
    name: sumo-sauce-backend
    runtime: node
    rootDir: server
    plan: starter
    numInstances: 1
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build
    startCommand: npm run start:hosted
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/var/data/sumo.db
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
